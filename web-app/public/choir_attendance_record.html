<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>개인 출석 기록</title>
  <style>
    :root{--primary:#2f6fed;--primary-dark:#1e56c8;--primary-light:#eef4fd;--bg:#f4f6fb;--surface:#fff;--border:#e4e9f2;--text:#1f2d3d;--muted:#6b7c93;--light:#adb5bd;--success:#10b981;--warning:#f59e0b;--error:#ef4444;--radius:18px;--radius-sm:12px;--shadow:0 10px 30px rgba(0,0,0,0.08);--shadow-sm:0 4px 16px rgba(0,0,0,0.06);}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#e8edf5;font-family:'Segoe UI',sans-serif;display:flex;justify-content:center;padding:24px 16px;min-height:100vh;}
    .phone{width:375px;background:var(--bg);border-radius:40px;box-shadow:0 30px 80px rgba(0,0,0,0.2);overflow:hidden;min-height:780px;position:relative;}
    .status-bar{background:var(--primary);height:28px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;}
    .status-bar span{color:#fff;font-size:11px;font-weight:600;}
    .header{background:linear-gradient(135deg,var(--primary) 0%,#4a90e2 100%);padding:16px 20px 20px;}
    .header-top{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
    .back-btn{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,0.2);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .header-title{color:#fff;font-size:17px;font-weight:700;}
    .content{padding:16px;overflow-y:auto;max-height:650px;}

    /* 요약 카드 */
    .summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
    .summary-card{background:var(--surface);border-radius:14px;padding:14px 10px;text-align:center;border:1px solid var(--border);box-shadow:var(--shadow-sm);}
    .summary-num{font-size:22px;font-weight:800;margin-bottom:4px;}
    .summary-label{font-size:11px;color:var(--muted);font-weight:600;}
    .num-present{color:var(--success);}
    .num-absent{color:var(--error);}
    .num-official{color:var(--warning);}

    /* 출석률 카드 */
    .rate-card{background:linear-gradient(135deg,var(--primary),#4a90e2);border-radius:var(--radius);padding:18px;margin-bottom:14px;box-shadow:0 8px 24px rgba(47,111,237,0.25);}
    .rate-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
    .rate-title{color:rgba(255,255,255,0.85);font-size:13px;font-weight:600;}
    .rate-num{color:#fff;font-size:28px;font-weight:800;}
    .rate-bar{background:rgba(255,255,255,0.25);border-radius:6px;height:8px;overflow:hidden;}
    .rate-fill{background:#fff;border-radius:6px;height:100%;}

    /* 월 필터 */
    .month-filter{display:flex;align-items:center;justify-content:space-between;padding:10px 0;margin-bottom:10px;}
    .month-nav{width:36px;height:36px;border-radius:10px;background:var(--surface);border:1px solid var(--border);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .month-label{font-size:16px;font-weight:700;color:var(--text);}

    /* 기록 리스트 */
    .card{background:var(--surface);border-radius:var(--radius);padding:16px;margin-bottom:12px;border:1px solid var(--border);box-shadow:var(--shadow-sm);}
    .record-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--bg);}
    .record-item:last-child{border-bottom:none;}
    .record-date{min-width:52px;text-align:center;}
    .record-day{font-size:18px;font-weight:800;color:var(--text);}
    .record-weekday{font-size:11px;color:var(--muted);}
    .record-info{flex:1;}
    .record-title{font-size:14px;font-weight:600;color:var(--text);}
    .record-sub{font-size:12px;color:var(--muted);margin-top:2px;}
    .record-badge{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;}
    .badge-present{background:#d1fae5;color:#065f46;}
    .badge-absent{background:#fee2e2;color:#991b1b;}
    .badge-official{background:#fef3c7;color:#92400e;}

    /* 스트릭 */
    .streak-card{background:linear-gradient(135deg,#f59e0b,#d97706);border-radius:var(--radius);padding:16px;margin-bottom:14px;display:flex;align-items:center;gap:14px;box-shadow:0 8px 24px rgba(245,158,11,0.25);}
    .streak-emoji{font-size:36px;}
    .streak-info{flex:1;}
    .streak-title{color:#fff;font-size:14px;font-weight:700;}
    .streak-num{color:#fff;font-size:24px;font-weight:800;}

    /* 하단 탭 */
    .bottom-nav{position:sticky;bottom:0;background:var(--surface);border-top:1px solid var(--border);display:flex;height:58px;}
    .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:10px;color:var(--light);font-weight:500;}
    .nav-item.active{color:var(--primary);}
    .nav-icon{font-size:20px;}
  </style>
</head>
<body>
<div class="phone">
  <div class="status-bar"><span>9:41</span><span>LTE ●●●</span></div>
  <div class="header">
    <div class="header-top">
      <button class="back-btn">←</button>
      <span class="header-title">내 출석 기록</span>
    </div>
  </div>
  <div class="content">

    <!-- 연속 출석 스트릭 -->
    <div class="streak-card">
      <div class="streak-emoji">🔥</div>
      <div class="streak-info">
        <div class="streak-title">연속 출석 중!</div>
        <div class="streak-num">12주 연속 출석 🎉</div>
      </div>
    </div>

    <!-- 요약 -->
    <div class="summary-grid">
      <div class="summary-card">
        <div class="summary-num num-present">42</div>
        <div class="summary-label">출석</div>
      </div>
      <div class="summary-card">
        <div class="summary-num num-absent">3</div>
        <div class="summary-label">결석</div>
      </div>
      <div class="summary-card">
        <div class="summary-num num-official">2</div>
        <div class="summary-label">공결</div>
      </div>
    </div>

    <!-- 출석률 -->
    <div class="rate-card">
      <div class="rate-row">
        <span class="rate-title">전체 출석률</span>
        <span class="rate-num">89.4%</span>
      </div>
      <div class="rate-bar"><div class="rate-fill" style="width:89%"></div></div>
    </div>

    <!-- 월 필터 -->
    <div class="month-filter">
      <button class="month-nav">‹</button>
      <span class="month-label">2026년 3월</span>
      <button class="month-nav">›</button>
    </div>

    <!-- 이달 기록 -->
    <div class="card">
      <div style="font-size:13px;font-weight:700;color:var(--muted);margin-bottom:12px;">📅 3월 출석 기록</div>
      <div class="record-item">
        <div class="record-date"><div class="record-day">2</div><div class="record-weekday">일</div></div>
        <div class="record-info"><div class="record-title">주일예배</div><div class="record-sub">주일 찬양대</div></div>
        <span class="record-badge badge-present">출석</span>
      </div>
      <div class="record-item">
        <div class="record-date"><div class="record-day">9</div><div class="record-weekday">일</div></div>
        <div class="record-info"><div class="record-title">주일예배</div><div class="record-sub">주일 찬양대</div></div>
        <span class="record-badge badge-present">출석</span>
      </div>
      <div class="record-item">
        <div class="record-date"><div class="record-day">16</div><div class="record-weekday">일</div></div>
        <div class="record-info"><div class="record-title">주일예배</div><div class="record-sub">주일 찬양대</div></div>
        <span class="record-badge badge-official">공결</span>
      </div>
      <div class="record-item">
        <div class="record-date"><div class="record-day">23</div><div class="record-weekday">일</div></div>
        <div class="record-info"><div class="record-title">주일예배</div><div class="record-sub">주일 찬양대</div></div>
        <span class="record-badge badge-present">출석</span>
      </div>
    </div>

    <!-- 지난달 기록 -->
    <div class="card">
      <div style="font-size:13px;font-weight:700;color:var(--muted);margin-bottom:12px;">📅 2월 출석 기록</div>
      <div class="record-item">
        <div class="record-date"><div class="record-day">2</div><div class="record-weekday">일</div></div>
        <div class="record-info"><div class="record-title">주일예배</div><div class="record-sub">주일 찬양대</div></div>
        <span class="record-badge badge-present">출석</span>
      </div>
      <div class="record-item">
        <div class="record-date"><div class="record-day">9</div><div class="record-weekday">일</div></div>
        <div class="record-info"><div class="record-title">주일예배</div><div class="record-sub">주일 찬양대</div></div>
        <span class="record-badge badge-absent">결석</span>
      </div>
      <div class="record-item">
        <div class="record-date"><div class="record-day">16</div><div class="record-weekday">일</div></div>
        <div class="record-info"><div class="record-title">헌신예배</div><div class="record-sub">주일 찬양대</div></div>
        <span class="record-badge badge-present">출석</span>
      </div>
      <div class="record-item">
        <div class="record-date"><div class="record-day">23</div><div class="record-weekday">일</div></div>
        <div class="record-info"><div class="record-title">주일예배</div><div class="record-sub">주일 찬양대</div></div>
        <span class="record-badge badge-present">출석</span>
      </div>
    </div>
    <div style="height:70px;"></div>
  </div>
  <div class="bottom-nav">
    <div class="nav-item"><div class="nav-icon">🏠</div>홈</div>
    <div class="nav-item"><div class="nav-icon">📅</div>일정</div>
    <div class="nav-item"><div class="nav-icon">👥</div>회원</div>
    <div class="nav-item active"><div class="nav-icon">✅</div>출석</div>
    <div class="nav-item"><div class="nav-icon">⚙️</div>관리</div>
  </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>연습 영상 목록</title>
  <style>
    :root{--primary:#2f6fed;--primary-dark:#1e56c8;--primary-light:#eef4fd;--bg:#f4f6fb;--surface:#fff;--border:#e4e9f2;--text:#1f2d3d;--muted:#6b7c93;--light:#adb5bd;--success:#10b981;--warning:#f59e0b;--error:#ef4444;--radius:18px;--radius-sm:12px;--shadow-sm:0 4px 16px rgba(0,0,0,0.06);}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#e8edf5;font-family:'Segoe UI',sans-serif;display:flex;justify-content:center;padding:24px 16px;min-height:100vh;}
    .phone{width:375px;background:var(--bg);border-radius:40px;box-shadow:0 30px 80px rgba(0,0,0,0.2);overflow:hidden;min-height:780px;}
    .status-bar{background:var(--primary);height:28px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;}
    .status-bar span{color:#fff;font-size:11px;font-weight:600;}
    .header{background:linear-gradient(135deg,var(--primary),#4a90e2);padding:16px 20px 20px;}
    .header-top{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
    .back-btn{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,0.2);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .header-title{color:#fff;font-size:17px;font-weight:700;}
    .add-btn{margin-left:auto;background:rgba(255,255,255,0.2);border:none;color:#fff;font-size:13px;font-weight:700;padding:6px 16px;border-radius:20px;cursor:pointer;}
    .search-box{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.2);border-radius:12px;padding:8px 14px;}
    .search-box span{color:rgba(255,255,255,0.8);font-size:15px;}
    .search-box input{background:none;border:none;outline:none;color:#fff;font-size:14px;flex:1;}
    .search-box input::placeholder{color:rgba(255,255,255,0.6);}
    .content{padding:16px;overflow-y:auto;max-height:630px;}

    /* 필터 */
    .filter-tabs{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;}
    .filter-tab{padding:7px 16px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);font-size:13px;font-weight:600;color:var(--muted);white-space:nowrap;cursor:pointer;flex-shrink:0;}
    .filter-tab.active{border-color:var(--primary);background:var(--primary-light);color:var(--primary);}

    /* 영상 카드 */
    .video-card{background:var(--surface);border-radius:var(--radius);margin-bottom:14px;overflow:hidden;border:1px solid var(--border);box-shadow:var(--shadow-sm);}
    .video-thumb{width:100%;height:160px;background:linear-gradient(135deg,#1e1e2e,#2d2d44);position:relative;display:flex;align-items:center;justify-content:center;}
    .play-btn{width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,0.9);display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 4px 16px rgba(0,0,0,0.3);cursor:pointer;}
    .video-duration{position:absolute;bottom:10px;right:10px;background:rgba(0,0,0,0.7);color:#fff;font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;}
    .video-part-badge{position:absolute;top:10px;left:10px;padding:4px 10px;border-radius:10px;font-size:11px;font-weight:700;}
    .badge-soprano{background:#fce7f3;color:#be185d;}
    .badge-alto{background:#ede9fe;color:#7c3aed;}
    .badge-tenor{background:#dbeafe;color:#1e40af;}
    .badge-bass{background:#d1fae5;color:#065f46;}
    .badge-full{background:var(--primary-light);color:var(--primary);}
    .video-info{padding:14px 16px;}
    .video-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px;}
    .video-meta{font-size:12px;color:var(--muted);margin-bottom:10px;line-height:1.5;}
    .video-footer{display:flex;align-items:center;justify-content:space-between;}
    .view-count{font-size:12px;color:var(--light);display:flex;align-items:center;gap:4px;}
    .video-actions{display:flex;gap:8px;}
    .v-btn{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;border:none;cursor:pointer;}
    .v-btn-primary{background:var(--primary-light);color:var(--primary);}
    .v-btn-red{background:#fee2e2;color:#dc2626;}

    /* 하단 탭 */
    .bottom-nav{position:sticky;bottom:0;background:var(--surface);border-top:1px solid var(--border);display:flex;height:58px;}
    .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:10px;color:var(--light);font-weight:500;}
    .nav-item.active{color:var(--primary);}
    .nav-icon{font-size:20px;}
  </style>
</head>
<body>
<div class="phone">
  <div class="status-bar"><span>9:41</span><span>LTE ●●●</span></div>
  <div class="header">
    <div class="header-top">
      <button class="back-btn">←</button>
      <span class="header-title">연습 영상</span>
      <button class="add-btn">+ 추가</button>
    </div>
    <div class="search-box">
      <span>🔍</span>
      <input placeholder="영상 검색..."/>
    </div>
  </div>
  <div class="content">

    <!-- 필터 -->
    <div class="filter-tabs">
      <div class="filter-tab active">전체</div>
      <div class="filter-tab">이번주</div>
      <div class="filter-tab">소프라노</div>
      <div class="filter-tab">알토</div>
      <div class="filter-tab">테너</div>
      <div class="filter-tab">베이스</div>
    </div>

    <!-- 영상 1 -->
    <div class="video-card">
      <div class="video-thumb">
        <div class="play-btn">▶️</div>
        <div class="video-duration">3:24</div>
        <div class="video-part-badge badge-full">전체 합창</div>
      </div>
      <div class="video-info">
        <div class="video-title">주님의 은혜 - 전체 연습</div>
        <div class="video-meta">3/15 주일예배 · 지휘: 김민수<br>업로드: 2026.03.08</div>
        <div class="video-footer">
          <span class="view-count">👁️ 28회 시청</span>
          <div class="video-actions">
            <button class="v-btn v-btn-primary">▶ 재생</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 영상 2 -->
    <div class="video-card">
      <div class="video-thumb">
        <div class="play-btn">▶️</div>
        <div class="video-duration">2:15</div>
        <div class="video-part-badge badge-tenor">테너</div>
      </div>
      <div class="video-info">
        <div class="video-title">주님의 은혜 - 테너 파트</div>
        <div class="video-meta">3/15 주일예배 · 테너 파트 전용<br>업로드: 2026.03.08</div>
        <div class="video-footer">
          <span class="view-count">👁️ 12회 시청</span>
          <div class="video-actions">
            <button class="v-btn v-btn-primary">▶ 재생</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 영상 3 -->
    <div class="video-card">
      <div class="video-thumb">
        <div class="play-btn">▶️</div>
        <div class="video-duration">2:48</div>
        <div class="video-part-badge badge-soprano">소프라노</div>
      </div>
      <div class="video-info">
        <div class="video-title">나의 피난처 - 소프라노 파트</div>
        <div class="video-meta">3/15 주일예배 · 소프라노 파트 전용<br>업로드: 2026.03.07</div>
        <div class="video-footer">
          <span class="view-count">👁️ 8회 시청</span>
          <div class="video-actions">
            <button class="v-btn v-btn-primary">▶ 재생</button>
          </div>
        </div>
      </div>
    </div>

    <div style="height:70px;"></div>
  </div>
  <div class="bottom-nav">
    <div class="nav-item"><div class="nav-icon">🏠</div>홈</div>
    <div class="nav-item"><div class="nav-icon">📅</div>일정</div>
    <div class="nav-item active"><div class="nav-icon">📂</div>자료실</div>
    <div class="nav-item"><div class="nav-icon">✅</div>출석</div>
    <div class="nav-item"><div class="nav-icon">⚙️</div>관리</div>
  </div>
</div>
</body>
</html>

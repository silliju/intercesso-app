plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

// key.properties 로드
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('app/keystore/../key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace = "com.intercesso.intercesso"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
        // flutter_local_notifications 등 Java 8+ API 사용을 위한 desugaring
        coreLibraryDesugaringEnabled = true
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    signingConfigs {
        release {
            keyAlias = keystoreProperties['keyAlias']
            keyPassword = keystoreProperties['keyPassword']
            storeFile = keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword = keystoreProperties['storePassword']
        }
    }

    defaultConfig {
        applicationId = "com.intercesso.intercesso"
        minSdk = 21
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
        manifestPlaceholders += [kakaoNativeAppKey: "3853e9c9f28e388a2f4dc4cffed572b4"]
    }

    buildTypes {
        release {
            // keystore 파일이 있을 때만 release 서명 사용, 없으면 debug 서명
            if (keystorePropertiesFile.exists() && keystoreProperties['storeFile']) {
                signingConfig = signingConfigs.release
            } else {
                signingConfig = signingConfigs.debug
            }
            minifyEnabled = false
            shrinkResources = false
        }
        debug {
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    // core library desugaring (flutter_local_notifications 필요)
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
}

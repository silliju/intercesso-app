name: intercesso
description: "기도 공유 플랫폼 - Intercesso"
publish_to: 'none'
version: 1.0.0+25

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP 클라이언트
  http: ^1.2.0
  dio: ^5.4.0

  # 상태관리
  provider: ^6.1.2
  
  # 로컬 스토리지
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # 네비게이션
  go_router: ^13.2.0

  # UI 컴포넌트
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  
  # 날짜/시간
  intl: ^0.19.0
  timeago: ^3.6.1
  
  # 이미지 선택
  image_picker: ^1.0.7
  
  # 기타
  connectivity_plus: ^6.0.2
  url_launcher: ^6.2.4
  share_plus: ^10.1.0
  webview_flutter: ^4.10.0
  
  # 차트
  fl_chart: ^0.68.0

  # Firebase / 푸시 알림
  firebase_core: ^3.6.0
  firebase_messaging: ^15.0.4
  flutter_local_notifications: ^17.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
